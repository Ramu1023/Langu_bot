<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Communication Trainer - Voice MVP</title>
    <style>
        :root {
            --primary: #4A90E2;
            --bg-color: #f4f7f6;
            --text-main: #333;
            --header-height: 60px;
            --footer-height: 60px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Global Header */
        header { height: var(--header-height); background: #fff; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: fixed; top: 0; width: 100%; z-index: 1000; }
        header h1 { font-size: 1.2rem; color: var(--primary); }
        .login-btn { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; }

        /* Main Content Area */
        main { margin-top: var(--header-height); margin-bottom: var(--footer-height); flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .page { display: none; flex: 1; }
        .page.active { display: flex; flex-direction: column; }

        /* Onboarding */
        #onboarding-view { background: white; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 2000; padding: 40px 20px; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-size: 1.1rem; cursor: pointer; margin-top: 10px; }

        /* Home Page (Voice Interface) */
        .trainer-container { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; flex: 1; text-align: center; padding-top: 20px; }
        .ai-avatar { width: 150px; height: 150px; border-radius: 50%; background: #dfe6e9; display: flex; align-items: center; justify-content: center; font-size: 4rem; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: transform 0.3s ease; }
        .ai-avatar.speaking { animation: pulse-avatar 1s infinite alternate; box-shadow: 0 0 20px var(--primary); }
        
        @keyframes pulse-avatar {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        .voice-status { margin-top: 10px; font-size: 0.9rem; color: #7f8c8d; min-height: 20px; }
        .live-transcript { margin-top: 20px; padding: 15px; background: white; border-radius: 10px; width: 100%; max-width: 400px; min-height: 80px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); font-style: italic; color: #555; }

        .mic-btn { margin-top: 30px; width: 80px; height: 80px; border-radius: 50%; background: #e74c3c; color: white; border: none; font-size: 2rem; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 10px rgba(231, 76, 60, 0.4); transition: all 0.3s ease; }
        .mic-btn.listening { background: #c0392b; animation: pulse-mic 1.5s infinite; }
        .mic-btn:disabled { background: #95a5a6; cursor: not-allowed; animation: none; box-shadow: none; }

        @keyframes pulse-mic {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        /* Status Bar */
        #ai-status { text-align: center; font-size: 0.85rem; color: #e67e22; margin-bottom: 10px; font-weight: bold; background: #fff3cd; padding: 5px; border-radius: 5px;}

        /* Footer */
        footer { height: var(--footer-height); background: white; display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; width: 100%; box-shadow: 0 -2px 5px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-btn { background: none; border: none; color: #7f8c8d; font-size: 0.9rem; display: flex; flex-direction: column; align-items: center; cursor: pointer; flex: 1; padding: 10px 0; }
        .nav-btn.active { color: var(--primary); font-weight: bold; }
        .nav-icon { font-size: 1.2rem; margin-bottom: 3px; }
        .center-content { display: flex; align-items: center; justify-content: center; height: 100%; font-size: 1.5rem; color: #7f8c8d; }
    </style>
</head>
<body>

    <div id="onboarding-view">
        <h2 style="text-align: center; color: var(--primary); margin-bottom: 20px;">Setup Voice Trainer</h2>
        <div class="form-group"><label>Name</label><input type="text" id="setup-name" placeholder="Enter your name" required></div>
        <div class="form-group"><label>Native Language</label>
            <select id="setup-native"><option value="English">English</option><option value="Hindi">Hindi</option></select>
        </div>
        <div class="form-group"><label>Language to Learn</label>
            <select id="setup-learning"><option value="English">English</option></select>
        </div>
        <div class="form-group"><label>Select AI Trainer</label>
            <select id="setup-trainer"><option value="Female">Female Voice</option><option value="Male">Male Voice</option></select>
        </div>
        <button class="btn-primary" onclick="completeSetup()">Start Learning</button>
    </div>

    <header>
        <h1>AI Comm Trainer</h1>
        <button class="login-btn" onclick="alert('Login – Coming Soon')">Login</button>
    </header>

    <main>
        <div id="ai-status">⚙️ Initializing Local AI Engine... (May take a moment)</div>

        <div id="home" class="page active">
            <div class="trainer-container">
                <div class="ai-avatar" id="home-avatar">👩‍🏫</div>
                <h2 id="home-greeting">Hello!</h2>
                <div class="voice-status" id="voice-status-text">Tap the microphone to speak.</div>
                
                <div class="live-transcript" id="live-transcript">
                    "AI response will appear here..."
                </div>

                <button class="mic-btn" id="mic-btn" onclick="toggleMicrophone()" disabled>🎤</button>
            </div>
        </div>

        <div id="chat" class="page"><div class="center-content">Text Chat moved to background. Use Home for Voice.</div></div>
        <div id="profile" class="page"><div class="center-content">Profile Settings</div></div>
        <div id="test" class="page"><div class="center-content">Assessments Coming Soon</div></div>
    </main>

    <footer>
        <button class="nav-btn active" onclick="navigate('home', this)"><span class="nav-icon">🏠</span>Home</button>
        <button class="nav-btn" onclick="navigate('chat', this)"><span class="nav-icon">💬</span>Logs</button>
        <button class="nav-btn" onclick="navigate('profile', this)"><span class="nav-icon">👤</span>Profile</button>
        <button class="nav-btn" onclick="navigate('test', this)"><span class="nav-icon">🧪</span>Test</button>
    </footer>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.16.0';

        env.allowLocalModels = false;
        
        let generator;
        let userData = JSON.parse(localStorage.getItem('aiTrainerData')) || null;
        
        // Voice Variables
        let recognition;
        let isListening = false;
        let synth = window.speechSynthesis;

        window.onload = () => {
            if (!userData) {
                document.getElementById('onboarding-view').style.display = 'block';
            } else {
                document.getElementById('onboarding-view').style.display = 'none';
                applyUserData();
                initLocalAI(); 
                setupVoiceRecognition();
            }
        };

        window.completeSetup = function() {
            userData = {
                name: document.getElementById('setup-name').value || "User",
                trainer: document.getElementById('setup-trainer').value,
            };
            localStorage.setItem('aiTrainerData', JSON.stringify(userData));
            document.getElementById('onboarding-view').style.display = 'none';
            applyUserData();
            initLocalAI();
            setupVoiceRecognition();
        }

        function applyUserData() {
            document.getElementById('home-greeting').innerText = `Hello, ${userData.name}!`;
            document.getElementById('home-avatar').innerText = userData.trainer === 'Female' ? '👩‍🏫' : '👨‍🏫';
        }

        window.navigate = function(pageId, btnElement) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btnElement.classList.add('active');
        }

        // --- LOCAL AI ENGINE ---
        async function initLocalAI() {
            const statusDiv = document.getElementById('ai-status');
            const micBtn = document.getElementById('mic-btn');

            try {
                statusDiv.innerText = "⏳ Loading Local AI Engine...";
                generator = await pipeline('text-generation', 'Xenova/DialoGPT-micro');
                
                statusDiv.innerText = "✅ Local AI Ready!";
                statusDiv.style.color = "#27ae60";
                statusDiv.style.background = "#d4edda";
                micBtn.disabled = false; // Enable mic only when AI is ready
                
                setTimeout(() => { statusDiv.style.display = 'none'; }, 3000);
            } catch (error) {
                console.error("AI Init Error:", error);
                statusDiv.innerText = "❌ Failed to load AI.";
            }
        }

        // --- SPEECH RECOGNITION (STT) ---
        function setupVoiceRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                document.getElementById('voice-status-text').innerText = "Speech recognition not supported in this browser.";
                return;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = false; // Stop after one sentence
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = function() {
                isListening = true;
                document.getElementById('mic-btn').classList.add('listening');
                document.getElementById('voice-status-text').innerText = "Listening...";
                document.getElementById('live-transcript').innerText = "Waiting for you to speak...";
            };

            recognition.onresult = async function(event) {
                const userSpeech = event.results[0][0].transcript;
                document.getElementById('live-transcript').innerText = `You: "${userSpeech}"`;
                document.getElementById('voice-status-text').innerText = "Processing local AI response...";
                
                // Pass to local AI
                await processAIResponse(userSpeech);
            };

            recognition.onerror = function(event) {
                console.error("Speech Recognition Error", event.error);
                document.getElementById('voice-status-text').innerText = "Error recognizing speech. Tap to try again.";
                stopListening();
            };

            recognition.onend = function() {
                stopListening();
            };
        }

        window.toggleMicrophone = function() {
            if (isListening) {
                recognition.stop();
            } else {
                // Cancel any ongoing AI speech before listening
                synth.cancel();
                document.getElementById('home-avatar').classList.remove('speaking');
                recognition.start();
            }
        }

        function stopListening() {
            isListening = false;
            document.getElementById('mic-btn').classList.remove('listening');
            if (document.getElementById('voice-status-text').innerText === "Listening...") {
                document.getElementById('voice-status-text').innerText = "Tap the microphone to speak.";
            }
        }

        // --- PROCESS & SPEAK (TTS) ---
        async function processAIResponse(text) {
            if (!generator) return;
            document.getElementById('mic-btn').disabled = true; // disable mic while thinking/speaking

            try {
                const out = await generator(text, {
                    max_new_tokens: 30,
                    temperature: 0.7,
                    repetition_penalty: 1.2,
                    do_sample: true
                });
                
                let aiResponse = out[0].generated_text.replace(text, "").trim();
                if(!aiResponse) aiResponse = "I hear you, keep practicing!";
                
                document.getElementById('live-transcript').innerText = `AI: "${aiResponse}"`;
                speakResponse(aiResponse);
            } catch (err) {
                document.getElementById('live-transcript').innerText = "⚠️ Error generating response.";
                document.getElementById('mic-btn').disabled = false;
            }
        }

        function speakResponse(text) {
            if (synth.speaking) {
                console.error('Speech synthesis already in progress.');
                return;
            }

            const utterThis = new SpeechSynthesisUtterance(text);
            
            // Try to set voice based on gender preference
            const voices = synth.getVoices();
            let selectedVoice = null;
            
            if (voices.length > 0) {
                if (userData.trainer === 'Female') {
                    selectedVoice = voices.find(v => v.name.includes('Female') || v.name.includes('Samantha') || v.name.includes('Google US English'));
                } else {
                    selectedVoice = voices.find(v => v.name.includes('Male') || v.name.includes('Alex') || v.name.includes('Daniel'));
                }
            }
            if (selectedVoice) utterThis.voice = selectedVoice;
            
            utterThis.rate = 1.0;

            utterThis.onstart = function() {
                document.getElementById('home-avatar').classList.add('speaking');
                document.getElementById('voice-status-text').innerText = "AI is speaking...";
            }

            utterThis.onend = function() {
                document.getElementById('home-avatar').classList.remove('speaking');
                document.getElementById('voice-status-text').innerText = "Tap the microphone to speak.";
                document.getElementById('mic-btn').disabled = false; // re-enable mic
            }

            utterThis.onerror = function(event) {
                document.getElementById('home-avatar').classList.remove('speaking');
                document.getElementById('mic-btn').disabled = false;
            }

            synth.speak(utterThis);
        }

        // Ensure voices load
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => synth.getVoices();
        }
    </script>
</body>
</html>
